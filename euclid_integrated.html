<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Euclid — Knowledge Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0e0f0e;color:#e8e5db;font-family:'DM Sans',sans-serif}

  :root{
    --bg:#0e0f0e;--bg2:#161714;--bg3:#1d1e1b;--bg4:#252621;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8e5db;--text2:#9a9890;--text3:#5a5955;
    --teal:#1D9E75;--teal2:#9FE1CB;--teal3:#04342C;
    --amber:#EF9F27;--amber2:#FAC775;
    --purple:#7F77DD;--purple2:#AFA9EC;
    --mono:'DM Mono',monospace;--serif:'Fraunces',serif;--sans:'DM Sans',sans-serif;
  }

  /* ── Shell ── */
  .shell{display:grid;grid-template-rows:52px 1fr;height:100vh;min-height:600px}

  /* ── Topbar ── */
  .topbar{
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 20px;gap:0;
    background:var(--bg);z-index:10;
  }
  .logo{
    font-family:var(--serif);font-size:17px;font-weight:500;
    letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;
    margin-right:28px;flex-shrink:0;color:var(--text);
  }
  .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--teal)}
  .nav-tabs{display:flex;gap:2px;flex:1}
  .nav-tab{
    padding:0 16px;height:52px;display:flex;align-items:center;
    font-size:13px;color:var(--text2);cursor:pointer;
    border-bottom:2px solid transparent;transition:all .15s;
    gap:7px;user-select:none;white-space:nowrap;
  }
  .nav-tab:hover{color:var(--text)}
  .nav-tab.active{color:var(--text);border-bottom-color:var(--teal)}
  .tab-badge{
    font-family:var(--mono);font-size:10px;
    background:rgba(29,158,117,0.15);color:var(--teal2);
    border:1px solid rgba(29,158,117,0.25);border-radius:10px;padding:1px 6px;
  }
  .topbar-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
  .streak-badge{
    display:flex;align-items:center;gap:5px;font-size:12px;
    font-family:var(--mono);color:var(--amber);
    background:rgba(239,159,39,0.08);border:1px solid rgba(239,159,39,0.18);
    border-radius:20px;padding:3px 10px;
  }
  .xp-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--teal2)}
  .xp-bar-wrap{width:72px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
  .xp-bar-fill{height:100%;border-radius:2px;background:var(--teal);width:63%;transition:width .6s ease}
  .avatar{
    width:28px;height:28px;border-radius:50%;background:var(--bg4);
    border:1px solid var(--border2);display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:500;color:var(--text2);
  }

  /* ── Body row ── */
  .body{display:flex;overflow:hidden;height:100%}

  /* ── Map area ── */
  #wrap{
    position:relative;flex:1;overflow:hidden;
    background:var(--color-background-tertiary,#111);
  }
  /* ── All original map CSS preserved verbatim below ── */
  #cv{width:100%;height:100%;cursor:grab;display:block}
  #cv:active{cursor:grabbing}
  #tt{
    position:absolute;pointer-events:none;
    background:#1a1b19;
    border:0.5px solid rgba(255,255,255,0.18);
    border-radius:8px;
    padding:11px 14px;font-size:13px;color:#ddd9cc;
    max-width:260px;opacity:0;transition:opacity .15s;z-index:10;
    line-height:1.4;
  }
  #tt .tt-t{font-weight:500;font-size:14px;margin-bottom:4px;color:#e8e5d8}
  #tt .tt-d{color:#a09d92;line-height:1.5;font-size:12px}
  #tt .tt-msc{margin-top:5px;font-size:10px;font-family:monospace;color:#6b6960;letter-spacing:.02em}
  #tt .tt-s{margin-top:4px;font-size:11px;color:#6b6960}
  #ui{
    position:absolute;top:14px;left:16px;
    font-size:11px;color:rgba(200,197,185,0.7);
    font-family:sans-serif;line-height:1.8;z-index:5;
  }
  #ui strong{color:rgba(225,222,210,0.95);font-weight:500;font-size:14px;display:block;margin-bottom:1px;letter-spacing:-.01em}
  #ui .sub{font-size:11px;color:rgba(200,197,185,0.7)}
  .pb{height:2px;border-radius:2px;background:rgba(255,255,255,0.07);margin-top:8px;overflow:hidden;width:160px}
  .pf{height:100%;border-radius:2px;background:#1D9E75;transition:width .4s}
  #pt{margin-top:3px;font-size:11px;color:rgba(200,197,185,0.7);font-family:monospace}
  #ctrls{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:5}
  #ctrls button{
    width:30px;height:30px;
    border:0.5px solid rgba(255,255,255,0.2);
    border-radius:8px;
    background:rgba(30,31,28,0.85);
    color:rgba(210,207,195,0.85);
    cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    font-family:monospace;
  }
  #ctrls button:hover{background:rgba(50,51,46,0.9);color:rgba(225,222,210,1)}
  #hint{
    position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    font-size:11px;color:rgba(200,197,185,0.5);
    font-family:sans-serif;
    pointer-events:none;transition:opacity .4s;white-space:nowrap;z-index:5;
  }
  #depth-filters{
    position:absolute;bottom:16px;right:14px;
    display:flex;flex-direction:column;gap:5px;
    z-index:5;align-items:flex-end;
  }
  .df-btn{
    display:flex;align-items:center;gap:7px;
    padding:4px 9px 4px 7px;border-radius:20px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.06);
    cursor:pointer;transition:all .15s;
    font-size:11px;font-family:monospace;
    color:rgba(210,207,195,0.75);user-select:none;
  }
  .df-btn:hover{background:rgba(255,255,255,0.12);color:rgba(220,217,205,0.95)}
  .df-btn.off{opacity:0.3;text-decoration:line-through}
  .df-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* ── Completion toast ── */
  #toast{
    position:absolute;bottom:20px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--bg);border:1px solid rgba(29,158,117,0.4);
    border-radius:10px;padding:12px 18px;
    display:flex;align-items:center;gap:12px;
    font-size:13px;white-space:nowrap;z-index:30;
    opacity:0;pointer-events:none;transition:all .3s;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
  .toast-icon{
    width:26px;height:26px;border-radius:50%;
    background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.3);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--teal);font-family:var(--mono);flex-shrink:0;
  }
  .toast-title{font-weight:500;color:var(--text);font-size:13px;margin-bottom:1px}
  .toast-sub{font-size:11px;color:var(--text2)}
  .toast-close{
    margin-left:6px;background:none;border:none;
    color:var(--text3);cursor:pointer;font-size:16px;
    padding:0 0 0 4px;font-family:var(--mono);
  }

  /* ── Side panel ── */
  #panel{
    width:0;overflow:hidden;
    border-left:0px solid var(--border);
    background:var(--bg);
    display:flex;flex-direction:column;
    transition:width .25s ease,border-left-width .25s ease;
    flex-shrink:0;position:relative;
  }
  #panel.open{width:292px;border-left-width:1px}
  .panel-inner{width:292px;display:flex;flex-direction:column;height:100%;overflow:hidden}

  .panel-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .panel-domain-tag{
    font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:.08em;margin-bottom:7px;
  }
  .panel-node-name{
    font-family:var(--serif);font-size:20px;font-weight:300;
    letter-spacing:-0.02em;color:var(--text);line-height:1.2;
  }
  .panel-node-name em{font-style:italic}
  .panel-desc{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
  .panel-msc{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:5px}

  .panel-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px}

  .panel-section-label{
    font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--text3);margin-bottom:8px;
  }

  /* mastery ring */
  .mastery-row{display:flex;align-items:center;gap:14px}
  .mastery-info{}
  .mastery-state{font-size:14px;font-weight:500;margin-bottom:2px}
  .mastery-sub{font-size:11px;color:var(--text3);line-height:1.4}

  /* context note */
  .context-note{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:6px;padding:10px 12px;
    font-size:12px;color:var(--text2);line-height:1.5;
  }
  .context-note strong{color:var(--text);font-weight:500}

  /* rel lists */
  .rel-list{display:flex;flex-direction:column;gap:4px}
  .rel-item{
    display:flex;align-items:center;gap:8px;
    padding:7px 10px;background:var(--bg2);
    border:1px solid var(--border);border-radius:6px;
    font-size:12px;cursor:pointer;transition:border-color .12s;
  }
  .rel-item:hover{border-color:var(--border2)}
  .rel-icon{
    width:16px;height:16px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-family:var(--mono);flex-shrink:0;
  }
  .rel-icon.mastered{background:rgba(29,158,117,0.15);color:var(--teal)}
  .rel-icon.partial{background:rgba(127,119,221,0.15);color:var(--purple2)}
  .rel-icon.none{background:var(--bg4);color:var(--text3)}
  .rel-name{flex:1;color:var(--text2)}
  .rel-pct{font-family:var(--mono);font-size:10px;color:var(--text3)}
  .rel-depth{
    font-family:var(--mono);font-size:9px;
    padding:1px 5px;border-radius:3px;
    background:var(--bg4);color:var(--text3);
  }

  /* panel footer */
  .panel-footer{
    padding:14px 18px;border-top:1px solid var(--border);
    flex-shrink:0;display:flex;gap:8px;
  }
  .btn-primary{
    flex:1;padding:9px;border-radius:7px;border:none;
    background:var(--teal);color:#04342C;
    font-family:var(--sans);font-size:13px;font-weight:500;
    cursor:pointer;transition:opacity .12s;
  }
  .btn-primary:hover{opacity:.88}
  .btn-ghost{
    padding:9px 12px;border-radius:7px;
    border:1px solid var(--border2);background:transparent;
    color:var(--text2);font-family:var(--sans);font-size:13px;
    cursor:pointer;transition:all .12s;
  }
  .btn-ghost:hover{background:var(--bg3);color:var(--text)}

  #panelClose{
    position:absolute;top:10px;right:10px;
    width:24px;height:24px;border:1px solid var(--border2);
    border-radius:5px;background:transparent;color:var(--text3);
    cursor:pointer;font-size:14px;display:flex;align-items:center;
    justify-content:center;z-index:2;font-family:var(--mono);
  }
  #panelClose:hover{background:var(--bg3);color:var(--text)}
</style>
</head>
<body>
<div class="shell">

  <!-- Topbar -->
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Euclid</div>
    <div class="nav-tabs">
      <div class="nav-tab">Learn</div>
      <div class="nav-tab active">Map</div>
      <div class="nav-tab">Review <span class="tab-badge">3 due</span></div>
    </div>
    <div class="topbar-right">
      <div class="streak-badge">◆ 12 day streak</div>
      <div class="xp-pill">
        <span>1,240 xp</span>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBarFill"></div></div>
        <span>Lv 4</span>
      </div>
      <div class="avatar">AK</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Map area -->
    <div id="wrap">
      <canvas id="cv"></canvas>

      <div id="tt">
        <div class="tt-t"></div>
        <div class="tt-d"></div>
        <div class="tt-msc"></div>
        <div class="tt-s"></div>
      </div>

      <div id="ui">
        <strong>Mathematics</strong>
        <span class="sub">Scroll to zoom · drag to pan · click to inspect</span>
        <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
        <div id="pt">0 / 0 topics</div>
      </div>

      <div id="ctrls">
        <button id="bz+">+</button>
        <button id="bz-">−</button>
        <button id="br">⊙</button>
      </div>

      <div id="hint">Zoom into a domain to explore its topics</div>
      <div id="depth-filters"></div>

      <div id="toast">
        <div class="toast-icon">✓</div>
        <div>
          <div class="toast-title" id="toastTitle"></div>
          <div class="toast-sub" id="toastSub"></div>
        </div>
        <button class="toast-close" onclick="hideToast()">×</button>
      </div>
    </div>

    <!-- Side panel -->
    <div id="panel">
      <button id="panelClose" onclick="closePanel()">×</button>
      <div class="panel-inner">
        <div class="panel-header">
          <div class="panel-domain-tag" id="panelTag"></div>
          <div class="panel-node-name" id="panelName"></div>
          <div class="panel-desc" id="panelDesc"></div>
          <div class="panel-msc" id="panelMsc"></div>
        </div>
        <div class="panel-body" id="panelBody"></div>
        <div class="panel-footer">
          <button class="btn-ghost" onclick="closePanel()">Close</button>
          <button class="btn-primary" id="panelGoBtn">Go to lesson →</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// MAP ENGINE — based on math_knowledge_map.html
// Integrated with Euclid platform:
//   • mastery Map (0-100) instead of learned Set (boolean)
//   • nodeMap + prereqs/dependents for O(1) graph traversal
//   • criticalPath, hoverPath, BFS pathfinding
//   • click → selectNode → openPanel (side panel, not floating overlay)
//   • window.euclidMap public API for lesson engine integration
// ─────────────────────────────────────────────────────────────────
const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');

function resize(){
  canvas.width=wrap.clientWidth*devicePixelRatio;
  canvas.height=wrap.clientHeight*devicePixelRatio;
  canvas.style.width=wrap.clientWidth+'px';
  canvas.style.height=wrap.clientHeight+'px';
  draw();
}

let tx=0,ty=0,scale=1;

const domains=[

{id:"arith_domain", label:"Arithmetic &\nNumber Sense", cx:-460, cy:0, rx:195, ry:170, col:"#854F0B",
 nodes:[
  {id:"counting",    label:"Counting",              r:0,   a:0,   d:1, msc:"97A20", desc:"Natural numbers, one-to-one correspondence, cardinality of small sets."},
  {id:"arith_ops",   label:"Four Operations",       r:45,  a:200, d:1, msc:"97F30", desc:"Addition, subtraction, multiplication, division of whole numbers."},
  {id:"fractions",   label:"Fractions",             r:55,  a:280, d:1, msc:"97F40", desc:"Parts of a whole, equivalent fractions, addition and subtraction."},
  {id:"decimals",    label:"Decimals & Percents",   r:65,  a:340, d:1, msc:"97F40", desc:"Decimal notation, place value, percentage and proportion."},
  {id:"neg_nums",    label:"Negative Numbers",      r:58,  a:120, d:1, msc:"97F30", desc:"Integers, number line, signed arithmetic."},
  {id:"divisibility",label:"Divisibility",          r:80,  a:240, d:2, msc:"11A05", desc:"Factors, multiples, GCD, LCM, prime factorization."},
  {id:"primes_elem", label:"Prime Numbers",         r:92,  a:300, d:2, msc:"11A41", desc:"Sieve of Eratosthenes, infinitude of primes, fundamental theorem of arithmetic."},
  {id:"modular_arith",label:"Modular Arithmetic",  r:105, a:260, d:2, msc:"11A07", desc:"Congruences mod n, clock arithmetic, divisibility rules."},
  {id:"ratio_prop",  label:"Ratios & Proportions",  r:72,  a:160, d:2, msc:"97F50", desc:"Equivalent ratios, scaling, unit rates, direct and inverse proportion."},
  {id:"elem_combin", label:"Counting Principles",   r:115, a:200, d:3, msc:"05A05", desc:"Multiplication principle, permutations, combinations, Pascal's triangle."},
  {id:"num_systems", label:"Number Systems",        r:125, a:310, d:3, msc:"11A63", desc:"Binary, hexadecimal, other bases. Place value abstracted."},
  {id:"p_adic_elem", label:"p-adic Numbers",        r:160, a:280, d:5, msc:"11S80", desc:"p-adic absolute value, p-adic integers and rationals. A different completion of ℚ."},
  {id:"surreal",     label:"Surreal Numbers",       r:168, a:240, d:6, msc:"11R04", desc:"Conway's surreal numbers: a proper class extending reals and ordinals."},
 ],
 edges:[
  {s:"counting",t:"arith_ops"},{s:"arith_ops",t:"fractions"},{s:"arith_ops",t:"neg_nums"},
  {s:"fractions",t:"decimals"},{s:"arith_ops",t:"divisibility"},{s:"divisibility",t:"primes_elem"},
  {s:"divisibility",t:"modular_arith"},{s:"fractions",t:"ratio_prop"},
  {s:"primes_elem",t:"elem_combin"},{s:"modular_arith",t:"num_systems"},
  {s:"modular_arith",t:"p_adic_elem"},{s:"p_adic_elem",t:"surreal"},
 ]
},

{id:"algebra_domain", label:"Algebra", cx:-325, cy:-325, rx:225, ry:195, col:"#534AB7",
 nodes:[
  {id:"pre_alg",     label:"Pre-Algebra",           r:0,   a:0,   d:2, msc:"97H20", desc:"Variables and expressions. Translating word problems into equations."},
  {id:"alg1",        label:"Algebra I",             r:50,  a:230, d:2, msc:"97H30", desc:"Linear equations and inequalities, graphing lines, systems of equations."},
  {id:"alg2",        label:"Algebra II",            r:75,  a:290, d:2, msc:"97H40", desc:"Polynomials, quadratics, exponentials, logarithms, conic sections."},
  {id:"lin_alg_elem",label:"Linear Algebra",        r:90,  a:340, d:3, msc:"15A03", desc:"Vectors, matrices, determinants, linear transformations, eigenvalues."},
  {id:"intro_proofs_alg",label:"Intro to Proofs",   r:80,  a:150, d:3, msc:"97E50", desc:"Direct proof, contradiction, induction. First exposure to rigorous mathematics."},
  {id:"group_theory",label:"Group Theory",          r:120, a:50,  d:4, msc:"20-01", desc:"Groups, subgroups, homomorphisms, quotient groups, group actions."},
  {id:"ring_theory", label:"Ring Theory",           r:125, a:100, d:4, msc:"13-01", desc:"Rings, ideals, quotient rings, integral domains, PIDs, UFDs."},
  {id:"field_theory",label:"Field Theory",          r:120, a:310, d:4, msc:"12F05", desc:"Field extensions, algebraic and transcendental elements, splitting fields."},
  {id:"galois",      label:"Galois Theory",         r:148, a:340, d:4, msc:"12F10", desc:"Galois correspondence, solvability by radicals, fundamental theorem."},
  {id:"modules",     label:"Module Theory",         r:140, a:130, d:4, msc:"16D10", desc:"Modules over rings, free and projective modules, exact sequences."},
  {id:"multilinear", label:"Multilinear Algebra",   r:110, a:270, d:4, msc:"15A69", desc:"Tensor products, exterior algebra, symmetric algebra."},
  {id:"comm_alg",    label:"Commutative Algebra",   r:162, a:80,  d:5, msc:"13A99", desc:"Noetherian rings, localization, Spec, dimension theory, completions."},
  {id:"homol_alg",   label:"Homological Algebra",   r:168, a:120, d:5, msc:"18G99", desc:"Chain complexes, derived functors, Ext and Tor, spectral sequences."},
  {id:"lie_alg",     label:"Lie Algebras",          r:170, a:30,  d:5, msc:"17B05", desc:"Lie brackets, solvable and semisimple Lie algebras, root systems, classification."},
  {id:"repr_theory", label:"Representation Theory", r:178, a:60,  d:5, msc:"20C99", desc:"Group representations, characters, Schur's lemma, induced representations."},
  {id:"cat_theory",  label:"Category Theory",       r:155, a:200, d:5, msc:"18A99", desc:"Categories, functors, natural transformations, limits, adjoints, Yoneda lemma."},
  {id:"k_theory_alg",label:"Algebraic K-Theory",   r:192, a:150, d:6, msc:"19-99", desc:"K₀, K₁, higher K-groups, Quillen's Q-construction."},
  {id:"infty_cats",  label:"∞-Categories",          r:200, a:185, d:6, msc:"18N60", desc:"Quasicategories, model categories, higher topos theory."},
  {id:"derived_alg", label:"Derived Algebraic Geometry",r:205,a:100,d:6,msc:"14A30",desc:"Derived stacks, structured ring spectra. The algebro-geometric frontier."},
 ],
 edges:[
  {s:"pre_alg",t:"alg1"},{s:"alg1",t:"alg2"},{s:"alg2",t:"lin_alg_elem"},
  {s:"alg1",t:"intro_proofs_alg"},{s:"intro_proofs_alg",t:"group_theory"},
  {s:"intro_proofs_alg",t:"ring_theory"},{s:"lin_alg_elem",t:"group_theory"},
  {s:"alg2",t:"field_theory"},{s:"ring_theory",t:"field_theory"},
  {s:"field_theory",t:"galois"},{s:"ring_theory",t:"modules"},
  {s:"lin_alg_elem",t:"multilinear"},{s:"modules",t:"multilinear"},

// ── Selection & pathfinding state ──
let selected=null, hovered=null;
let criticalPath=[];
let hoverPathNodes=new Set();
let hoverPathEdgeKeys=new Set();

// Walk back always picking the deepest prereq — longest chain to root
function computeCriticalPath(node){
  const path=[node];
  let cur=node;
  while(cur.prereqs.length){
    cur=cur.prereqs.reduce((best,p)=>p.d>best.d?p:best);
    if(path.includes(cur)) break;
    path.unshift(cur);
  }
  return path;
}

// BFS from start following dependents, return path to end or null
function bfsPath(start,end){
  const parent=new Map();
  const q=[start];
  parent.set(start,null);
  while(q.length){
    const cur=q.shift();
    if(cur===end){
      const path=[];let n=end;
      while(n!==null){path.push(n);n=parent.get(n);}
      return path.reverse();
    }
    for(const nb of cur.dependents){
      if(!parent.has(nb)){parent.set(nb,cur);q.push(nb);}
    }
  }
  return null;
}

function edgeKey(a,b){return a.id+'>'+b.id;}

function updateHoverPath(){
  hoverPathNodes=new Set();
  hoverPathEdgeKeys=new Set();
  if(!selected||!hovered||selected===hovered) return;
  const path=bfsPath(selected,hovered)||bfsPath(hovered,selected);
  if(!path) return;
  for(const n of path) hoverPathNodes.add(n);
  for(let i=0;i<path.length-1;i++) hoverPathEdgeKeys.add(edgeKey(path[i],path[i+1]));
}

function selectNode(nd){
  selected=nd;
  criticalPath=nd?computeCriticalPath(nd):[];
  updateHoverPath();
  if(nd) openPanel(nd);
  else closePanel();
  draw();
}

function hexToRgb(h){
  return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};
}
function toScreen(wx,wy){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  return{x:cw/2+wx*scale+tx, y:ch/2+wy*scale+ty};
}
function toWorld(sx,sy){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  return{x:(sx-cw/2-tx)/scale, y:(sy-ch/2-ty)/scale};
}

const enabledDepths=new Set([1,2,3,4,5,6]);
function nodesVisible(){ return scale>0.75; }
function globalNodeAlpha(){ return Math.max(0,Math.min(1,(scale-0.75)/0.45)); }
function nodeIsVisible(d){ return enabledDepths.has(d)&&nodesVisible(); }

// ── Draw: blobs — verbatim ──
function drawBlob(dom){
  const sc=toScreen(dom.cx,dom.cy);
  const rx=dom.rx*scale,ry=dom.ry*scale;
  const rgb=hexToRgb(dom.col);
  ctx.save();
  ctx.beginPath();
  const steps=64;
  for(let i=0;i<=steps;i++){
    const a=(i/steps)*Math.PI*2;
    const w=1+0.05*Math.sin(a*3+dom.cx*0.006)+0.025*Math.cos(a*7+dom.cy*0.009)+0.015*Math.sin(a*11);
    const x=sc.x+Math.cos(a)*rx*w;
    const y=sc.y+Math.sin(a)*ry*w;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  const grad=ctx.createRadialGradient(sc.x,sc.y,0,sc.x,sc.y,Math.max(rx,ry));
  grad.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},0.20)`);
  grad.addColorStop(0.5,`rgba(${rgb.r},${rgb.g},${rgb.b},0.10)`);
  grad.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},0.03)`);
  ctx.fillStyle=grad;
  ctx.fill();
  ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.30)`;
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.restore();
}

// ── Draw: blob labels — verbatim ──
function drawBlobLabel(dom){
  const sc=toScreen(dom.cx,dom.cy);
  const rgb=hexToRgb(dom.col);
  const a=Math.max(0,1-globalNodeAlpha()*2);
  if(a<0.02) return;
  const sz=Math.max(13,17*Math.min(scale,1.3));
  ctx.save();
  ctx.font=`500 ${sz}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${a*0.9})`;
  dom.label.split('\n').forEach((line,i,arr)=>{
    ctx.fillText(line,sc.x,sc.y+(i-(arr.length-1)/2)*sz*1.25);
  });
  ctx.restore();
}

// ── Draw: edges — pathfinding + mastery-aware colouring ──
function drawEdges(){
  if(!nodesVisible()) return;
  const ga=globalNodeAlpha();

  // Build connected edge keys from selected node
  const connectedKeys=new Set();
  if(selected){
    selected.prereqs.forEach(p=>connectedKeys.add(edgeKey(p,selected)));
    selected.dependents.forEach(d=>connectedKeys.add(edgeKey(selected,d)));
    for(let i=0;i<criticalPath.length-1;i++)
      connectedKeys.add(edgeKey(criticalPath[i],criticalPath[i+1]));
  }

  allEdges.forEach(e=>{
    const sn=nodeMap.get(e.s),tn=nodeMap.get(e.t);
    if(!sn||!tn) return;
    if(!nodeIsVisible(sn.d)||!nodeIsVisible(tn.d)) return;
    const ss=toScreen(sn.wx,sn.wy),ts=toScreen(tn.wx,tn.wy);
    const key=edgeKey(sn,tn);
    const isHoverPath=hoverPathEdgeKeys.has(key);
    const isCritPath=selected&&connectedKeys.has(key)&&criticalPath.includes(sn)&&criticalPath.includes(tn);
    const isConnected=selected&&connectedKeys.has(key)&&!isCritPath;
    const isDimmed=selected&&!isHoverPath&&!isCritPath&&!isConnected;

    let col,lw,dash=false;
    if(isHoverPath){          col=`rgba(150,220,255,${0.9*ga})`;  lw=2.2;}
    else if(isCritPath){      col=`rgba(255,210,70,${0.9*ga})`;   lw=2.5;}
    else if(isConnected){
      col=tn===selected?`rgba(100,180,255,${0.78*ga})`:`rgba(255,165,70,${0.78*ga})`;lw=1.8;
    } else if(isDimmed){      col=`rgba(255,255,255,${0.025*ga})`;lw=0.5;}
    else if(e.cross){         col=`rgba(160,155,140,${0.22*ga})`; lw=0.6; dash=true;}
    else{                     col=`rgba(140,135,125,${0.38*ga})`; lw=1.1;}

    ctx.save();
    ctx.beginPath();
    if(dash){
      const mx=(ss.x+ts.x)/2,my=(ss.y+ts.y)/2;
      const dx=ts.x-ss.x,dy=ts.y-ss.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      ctx.moveTo(ss.x,ss.y);
      ctx.quadraticCurveTo(mx-dy/len*22*scale,my+dx/len*22*scale,ts.x,ts.y);
      ctx.setLineDash([6,6]);
    } else {
      ctx.moveTo(ss.x,ss.y);ctx.lineTo(ts.x,ts.y);
    }
    ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();ctx.setLineDash([]);

    if(!isDimmed&&!dash&&lw>=1.1){
      const dx=ts.x-ss.x,dy=ts.y-ss.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/len,uy=dy/len;
      const ax=ts.x-ux*8,ay=ts.y-uy*8;
      ctx.beginPath();
      ctx.moveTo(ax-uy*3,ay+ux*3);ctx.lineTo(ts.x-ux*4,ts.y-uy*4);ctx.lineTo(ax+uy*3,ay-ux*3);
      ctx.strokeStyle=col;ctx.lineWidth=0.8;ctx.stroke();
    }
    ctx.restore();
  });
}

// ── Draw: nodes — pathfinding highlights + mastery fill ──
function drawNodes(){
  if(!nodesVisible()) return;
  const ga=globalNodeAlpha();
  const critSet=new Set(criticalPath);
  allNodes.forEach(nd=>{
    if(!nodeIsVisible(nd.d)) return;
    const sc=toScreen(nd.wx,nd.wy);
    const m=getMastery(nd.id);
    const isSel=nd===selected;
    const isPrereq=selected&&selected.prereqs.includes(nd);
    const isDependent=selected&&selected.dependents.includes(nd);
    const isCrit=critSet.has(nd);
    const isHoverPath=hoverPathNodes.has(nd);
    const isDimmed=selected&&!isSel&&!isPrereq&&!isDependent&&!isCrit&&!isHoverPath;
    const rgb=hexToRgb(nd.domCol);
    const drgb=hexToRgb(depthCols[nd.d]||'#888');
    const baseR=Math.max(3.5,8*Math.min(1,scale/1.8));
    const r=baseR*(1.3-nd.d*0.05)*(isSel?1.5:1);
    const nodeGa=isDimmed?ga*0.12:ga;

    ctx.save();
    ctx.beginPath();
    ctx.arc(sc.x,sc.y,r,0,Math.PI*2);

    if(isSel){
      ctx.fillStyle=`rgba(255,255,255,${0.18*ga})`;
      ctx.strokeStyle=`rgba(255,255,255,${ga})`;
      ctx.lineWidth=2;
    } else if(isHoverPath){
      ctx.fillStyle=`rgba(150,220,255,${0.25*ga})`;
      ctx.strokeStyle=`rgba(150,220,255,${0.9*ga})`;
      ctx.lineWidth=1.8;
    } else if(isCrit&&selected){
      ctx.fillStyle=`rgba(255,210,70,${0.18*ga})`;
      ctx.strokeStyle=`rgba(255,210,70,${0.85*ga})`;
      ctx.lineWidth=1.8;
    } else if(isPrereq){
      ctx.fillStyle=`rgba(100,180,255,${0.2*ga})`;
      ctx.strokeStyle=`rgba(100,180,255,${0.85*ga})`;
      ctx.lineWidth=1.8;
    } else if(isDependent){
      ctx.fillStyle=`rgba(255,165,70,${0.2*ga})`;
      ctx.strokeStyle=`rgba(255,165,70,${0.85*ga})`;
      ctx.lineWidth=1.8;
    } else if(m>=80){
      ctx.fillStyle=`rgba(29,158,117,${nodeGa})`;
      ctx.strokeStyle=`rgba(8,80,65,${nodeGa})`;
      ctx.lineWidth=2;
    } else if(m>0){
      ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${0.25*nodeGa})`;
      ctx.strokeStyle=`rgba(${drgb.r},${drgb.g},${drgb.b},${0.85*nodeGa})`;
      ctx.lineWidth=1.4;
    } else {
      ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${0.15*nodeGa})`;
      ctx.strokeStyle=`rgba(${drgb.r},${drgb.g},${drgb.b},${0.5*nodeGa})`;
      ctx.lineWidth=1;
    }
    ctx.fill();ctx.stroke();

    // Mastery arc fill for partial progress (only when not in a highlight state)
    if(m>0&&m<80&&!isSel&&!isPrereq&&!isDependent&&!isCrit&&!isHoverPath){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(sc.x,sc.y);
      ctx.arc(sc.x,sc.y,r,-Math.PI/2,-Math.PI/2+(m/100)*Math.PI*2);
      ctx.closePath();
      ctx.fillStyle=`rgba(29,158,117,${0.45*nodeGa})`;
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();

    const sz=Math.min(13,Math.max(8,8.5+(scale-1)*1.8));
    const labelAlpha=isDimmed?ga*0.1:ga*0.9;
    ctx.save();
    ctx.font=`${nd.d<=3?'500':'400'} ${sz}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillStyle=`rgba(220,217,205,${labelAlpha})`;
    nd.label.split('\n').forEach((line,i)=>{ctx.fillText(line,sc.x,sc.y+r+2+i*(sz+1));});
    ctx.restore();
  });
}

// ── Main draw — verbatim ──
function draw(){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,cw,ch);
  domains.forEach(dom=>drawBlob(dom));
  drawEdges();
  drawNodes();
  domains.forEach(dom=>drawBlobLabel(dom));
  document.getElementById('hint').style.opacity=scale>1.6?'0':'1';
}

// ── Depth filters — verbatim ──
function buildDepthFilters(){
  const el=document.getElementById('depth-filters');
  el.innerHTML='';
  for(let d=6;d>=1;d--){
    const col=depthCols[d];
    const btn=document.createElement('div');
    btn.className='df-btn'+(enabledDepths.has(d)?'':' off');
    btn.dataset.d=d;
    btn.innerHTML=`<span class="df-dot" style="background:${col}"></span>${depthLabels[d]}`;
    btn.addEventListener('click',()=>{
      if(enabledDepths.has(d)) enabledDepths.delete(d);
      else enabledDepths.add(d);
      btn.classList.toggle('off',!enabledDepths.has(d));
      draw();
    });
    el.appendChild(btn);
  }
}

// ── Pan & zoom — verbatim ──
let dragging=false,lx=0,ly=0,moved=false;
canvas.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;moved=false;});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{
  if(dragging){
    const dx=e.clientX-lx,dy=e.clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    tx+=dx;ty+=dy;lx=e.clientX;ly=e.clientY;draw();
  }
  if(!nodesVisible()){document.getElementById('tt').style.opacity='0';return;}
  const r=canvas.getBoundingClientRect();
  const wpos=toWorld(e.clientX-r.left,e.clientY-r.top);
  let hit=null,minD=999;
  allNodes.forEach(nd=>{
    if(!nodeIsVisible(nd.d)) return;
    const dx=nd.wx-wpos.x,dy=nd.wy-wpos.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<16/scale&&d<minD){minD=d;hit=nd;}
  });
  if(hit!==hovered){
    hovered=hit;
    updateHoverPath();
    draw();
  }
  const tt=document.getElementById('tt');
  if(hit&&!selected){
    const m=getMastery(hit.id);
    tt.querySelector('.tt-t').textContent=hit.label;
    tt.querySelector('.tt-d').textContent=hit.desc;
    tt.querySelector('.tt-msc').textContent=`MSC ${hit.msc} · depth ${hit.d} · ${hit.domLabel}`;
    const pres=hit.prereqs.map(p=>p.label);
    tt.querySelector('.tt-s').textContent=pres.length?'Builds on: '+pres.slice(0,4).join(', ')+(pres.length>4?'…':''):'Entry point — no prerequisites';
    tt.style.opacity='1';
    let tx2=e.clientX-r.left+16,ty2=e.clientY-r.top-14;
    if(tx2+268>r.width) tx2=e.clientX-r.left-274;
    if(ty2<0) ty2=e.clientY-r.top+16;
    tt.style.left=tx2+'px';tt.style.top=ty2+'px';
  } else {
    tt.style.opacity='0';
  }
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  const wx=(mx-cw/2-tx)/scale,wy=(my-ch/2-ty)/scale;
  scale=Math.max(0.25,Math.min(8,scale*(e.deltaY<0?1.1:0.91)));
  tx=mx-cw/2-wx*scale;ty=my-ch/2-wy*scale;
  draw();
},{passive:false});

// Touch — verbatim
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;moved=false;}},{passive:true});
canvas.addEventListener('touchend',()=>dragging=false);
canvas.addEventListener('touchmove',e=>{
  if(dragging&&e.touches.length===1){
    const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    tx+=dx;ty+=dy;
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;draw();
  }
},{passive:true});

document.getElementById('bz+').onclick=()=>{scale=Math.min(8,scale*1.3);draw();};
document.getElementById('bz-').onclick=()=>{scale=Math.max(0.25,scale/1.3);draw();};
document.getElementById('br').onclick=()=>{scale=1;tx=0;ty=0;draw();};

canvas.addEventListener('click',e=>{
  if(moved) return;
  if(!nodesVisible()) return;
  const r=canvas.getBoundingClientRect();
  const wpos=toWorld(e.clientX-r.left,e.clientY-r.top);
  let hit=null,minD=999;
  allNodes.forEach(nd=>{
    if(!nodeIsVisible(nd.d)) return;
    const dx=nd.wx-wpos.x,dy=nd.wy-wpos.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<16/scale&&d<minD){minD=d;hit=nd;}
  });
  selectNode(hit===selected?null:hit);
});

window.addEventListener('keydown',e=>{if(e.key==='Escape') selectNode(null);});

// ── Progress counter ──
function updateProgress(){
  const total=allNodes.length;
  const mastered=allNodes.filter(n=>getMastery(n.id)>=80).length;
  const inProg=allNodes.filter(n=>{const m=getMastery(n.id);return m>0&&m<80;}).length;
  const pct=Math.round((mastered/total)*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${mastered} mastered · ${inProg} in progress · ${total} total`;
}

// ── Side panel ──
function openPanel(nd){
  draw();

  const col=nd.domCol;
  const tag=document.getElementById('panelTag');
  tag.textContent=nd.domLabel;
  tag.style.color=col;

  document.getElementById('panelName').innerHTML=`<em style="color:${col}">${nd.label.replace('\n',' ')}</em>`;
  document.getElementById('panelDesc').textContent=nd.desc;
  document.getElementById('panelMsc').textContent=`MSC ${nd.msc} · Depth ${nd.d}: ${depthLabels[nd.d]||''}`;

  const m=getMastery(nd.id);
  const prereqs=nd.prereqs;
  const unlocks=nd.dependents;

  const stateLabel=m>=80?'Mastered':m>0?'In progress':'Not yet studied';
  const stateCol=m>=80?'#1D9E75':m>0?'#7F77DD':'#5a5955';

  const gaps=prereqs.filter(p=>getMastery(p.id)<60);
  const gapText=gaps.length
    ? `${gaps.length} suggested prerequisite${gaps.length>1?'s':''} not yet covered: ${gaps.map(g=>g.label.replace('\n',' ')).join(', ')}.`
    : prereqs.length ? 'Good coverage of the suggested prerequisites.' : '';

  const circ=2*Math.PI*20;
  const dash=Math.round((m/100)*circ);

  let html=`<div>
    <div class="panel-section-label">Mastery</div>
    <div class="mastery-row">
      <svg width="52" height="52" viewBox="0 0 52 52" style="flex-shrink:0">
        <circle cx="26" cy="26" r="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4"/>
        <circle cx="26" cy="26" r="20" fill="none"
          stroke="${stateCol}" stroke-width="4"
          stroke-dasharray="${dash} ${circ}"
          stroke-dashoffset="${circ*0.25}"
          stroke-linecap="round"/>
        <text x="26" y="31" text-anchor="middle"
          font-family="monospace" font-size="11"
          fill="${stateCol}">${m}%</text>
      </svg>
      <div class="mastery-info">
        <div class="mastery-state" style="color:${stateCol}">${stateLabel}</div>
        <div class="mastery-sub">${m>=80?'Available for spaced review':'Jump in anytime — prerequisites are suggestions'}</div>
      </div>
    </div>
  </div>`;

  if(gapText){
    html+=`<div class="context-note"><strong>Context:</strong> ${gapText} You can start here regardless.</div>`;
  }

  if(criticalPath.length>1){
    const pathHtml=criticalPath.map(n=>`<span style="cursor:pointer;padding:1px 3px;border-radius:3px;${n===nd?'color:var(--text);font-weight:500':'color:var(--text2)'}" onclick="selectNode(nodeMap.get('${n.id}'))">${n.label.replace('\n',' ')}</span>`).join('<span style="color:var(--text3)"> → </span>');
    html+=`<div><div class="panel-section-label">Critical path from root</div><div style="font-size:12px;line-height:2">${pathHtml}</div></div>`;
  }

  if(prereqs.length){
    html+=`<div><div class="panel-section-label">Builds on</div><div class="rel-list">`;
    prereqs.forEach(p=>{
      const pm=getMastery(p.id);
      const cls=pm>=80?'mastered':pm>0?'partial':'none';
      const icon=pm>=80?'✓':pm>0?'~':'○';
      html+=`<div class="rel-item" onclick="selectNode(nodeMap.get('${p.id}'))">
        <div class="rel-icon ${cls}">${icon}</div>
        <span class="rel-name">${p.label.replace('\n',' ')}</span>
        <span class="rel-depth" style="color:${depthCols[p.d]}">${p.d}</span>
        <span class="rel-pct">${pm>0?pm+'%':''}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }

  if(unlocks.length){
    const shown=unlocks.slice(0,8);
    const extra=unlocks.length>8?unlocks.length-8:0;
    html+=`<div><div class="panel-section-label">Leads to</div><div class="rel-list">`;
    shown.forEach(u=>{
      const um=getMastery(u.id);
      const cls=um>=80?'mastered':um>0?'partial':'none';
      const icon=um>=80?'✓':um>0?'~':'○';
      html+=`<div class="rel-item" onclick="selectNode(nodeMap.get('${u.id}'))">
        <div class="rel-icon ${cls}">${icon}</div>
        <span class="rel-name">${u.label.replace('\n',' ')}</span>
        <span class="rel-depth" style="color:${depthCols[u.d]}">${u.d}</span>
        <span class="rel-pct">${um>0?um+'%':''}</span>
      </div>`;
    });
    if(extra) html+=`<div style="font-size:11px;color:var(--text3);padding:4px 10px">+${extra} more</div>`;
    html+=`</div></div>`;
  }

  document.getElementById('panelBody').innerHTML=html;

  const goBtn=document.getElementById('panelGoBtn');
  goBtn.textContent=m>=80?'Review →':'Go to lesson →';

  document.getElementById('panel').classList.add('open');
  setTimeout(()=>{ resize(); },260);
}

function closePanel(){
  selected=null;
  criticalPath=[];
  hoverPathNodes=new Set();
  hoverPathEdgeKeys=new Set();
  document.getElementById('panel').classList.remove('open');
  draw();
  setTimeout(()=>{ resize(); },260);
}

// ── Toast (called from learning platform on lesson completion) ──
function showToast(title,sub){
  document.getElementById('toastTitle').textContent=title;
  document.getElementById('toastSub').textContent=sub;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4500);
}
function hideToast(){ document.getElementById('toast').classList.remove('show'); }

// ── Public API — called by lesson engine ──
// e.g. window.euclidMap.setMastery('calc1', 75)
window.euclidMap={
  setMastery(id,val){
    mastery.set(id,Math.max(0,Math.min(100,val)));
    updateProgress();
    draw();
    if(selected&&selected.id===id) openPanel(selected);
  },
  getMastery,
  showToast,
};

window.addEventListener('resize',resize);
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',draw);
buildDepthFilters();
updateProgress();
resize();
</script>
